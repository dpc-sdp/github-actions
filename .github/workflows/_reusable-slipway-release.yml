name: _reusable-slipway-release

on:
  workflow_call:
    inputs:
      slipway-workspace-slug:
        required: true
        type: string
      slipway-project-slug:
        required: true
        type: string
      slipway-api-base-url:
        required: true
        type: string
      version:
        description: Version string passed as the Slipway release version param.
        required: true
        type: string
      image-uri:
        description: Image URI to associate with the Slipway release.
        required: true
        type: string
      image-digest:
        description: Image digest (sha256:...) to associate with the Slipway release.
        required: true
        type: string
      pr-number:
        description: Optional PR number to include in the release payload (empty for non-PR releases).
        required: false
        type: string
        default: ''
      ref:
        description: Optional git ref to checkout (defaults to the calling workflow's ref).
        required: false
        type: string
        default: ''
    outputs:
      release-id:
        description: Slipway release id (FINAL).
        value: ${{ jobs.release.outputs.release-id }}

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      release-id: ${{ steps.create.outputs.release-id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Slipway CLI
        uses: service-victoria/slipway-clients/setup-slipway@main
        with:
          api-base-url: ${{ inputs.slipway-api-base-url }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release payload
        id: payload
        env:
          IMAGE_URI: ${{ inputs.image-uri }}
          IMAGE_DIGEST: ${{ inputs.image-digest }}
          GIT_SHA: ${{ github.sha }}
          GIT_REF: ${{ github.ref }}
          GIT_REF_TYPE: ${{ github.ref_type }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ inputs.pr-number }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          pr_number_field='null'
          if [[ -n "$PR_NUMBER" ]]; then
            pr_number_field="$PR_NUMBER"
          fi

          sdp_version=$(jq -r '.sdp_version // ""' package.json)
          ripple_version=$(jq -r '.devDependencies["@dpc-sdp/nuxt-ripple"] // ""' package.json)

          payload=$(jq -n \
            --arg image_uri "$IMAGE_URI" \
            --arg image_digest "$IMAGE_DIGEST" \
            --arg git_sha "$GIT_SHA" \
            --arg git_ref "$GIT_REF" \
            --arg git_ref_type "$GIT_REF_TYPE" \
            --arg repository "$REPOSITORY" \
            --arg actor "$ACTOR" \
            --arg run_id "$RUN_ID" \
            --arg version "$VERSION" \
            --arg sdp_version "$sdp_version" \
            --arg ripple_version "$ripple_version" \
            --argjson pr_number "$pr_number_field" \
            '{
              image_uri: $image_uri,
              image_digest: $image_digest,
              git_sha: $git_sha,
              git_ref: $git_ref,
              git_ref_type: $git_ref_type,
              repository: $repository,
              actor: $actor,
              run_id: $run_id,
              pr_number: $pr_number,
              package_version: $version,
              sdp_version: $sdp_version,
              ripple_version: $ripple_version
            }')

          {
            echo "payload<<EOF"
            echo "$payload"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Slipway release (DRAFT)
        id: create
        env:
          WORKSPACE: ${{ inputs.slipway-workspace-slug }}
          PROJECT: ${{ inputs.slipway-project-slug }}
          VERSION: ${{ inputs.version }}
          PAYLOAD: ${{ steps.payload.outputs.payload }}
        run: |
          set -euo pipefail
          release_id=$(slipway releases create \
            --workspace-slug "$WORKSPACE" \
            --project-slug "$PROJECT" \
            --version-param "$VERSION" \
            --payload-jsonb "$PAYLOAD" \
            --output-format json | jq -r '.id')

          if [[ -z "$release_id" || "$release_id" == "null" ]]; then
            echo "::error::Failed to create Slipway release"
            exit 1
          fi

          echo "release-id=${release_id}" >> "$GITHUB_OUTPUT"

      - name: Finalize Slipway release (DRAFT -> FINAL)
        env:
          WORKSPACE: ${{ inputs.slipway-workspace-slug }}
          PROJECT: ${{ inputs.slipway-project-slug }}
          RELEASE_ID: ${{ steps.create.outputs.release-id }}
        run: |
          set -euo pipefail
          slipway releases finalize \
            --workspace-slug "$WORKSPACE" \
            --project-slug "$PROJECT" \
            --id "$RELEASE_ID"

      - name: Summary
        env:
          RELEASE_ID: ${{ steps.create.outputs.release-id }}
          VERSION: ${{ inputs.version }}
          API_BASE: ${{ inputs.slipway-api-base-url }}
        run: |
          {
            echo "### Slipway release"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Release id | \`${RELEASE_ID}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| State | FINAL |"
            echo "| API | ${API_BASE} |"
          } >> "$GITHUB_STEP_SUMMARY"
