name: Terraform plan
on:
  workflow_call:
    inputs:
      aws_default_region:
        description: AWS region for the state file
        type: string
        required: false
        default: ap-southeast-2
      tf_github_owner:
        description: Terraform GitHub repo owner
        type: string
        required: false
        default: dpc-sdp
      terraform_version:
        description: Terraform CLI version to install
        type: string
        required: false
        default: "1.5.7"

env:
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ inputs.aws_default_region }}
  EC_API_KEY: ${{ secrets.EC_API_KEY }}
  GITHUB_OWNER: ${{ inputs.tf_github_owner }}
  GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
  SUMOLOGIC_ACCESSID: ${{ secrets.SUMOLOGIC_ACCESSID }}
  SUMOLOGIC_ACCESSKEY: ${{ secrets.SUMOLOGIC_ACCESSKEY }}
  CONSTELLIX_API_KEY:  ${{ secrets.CONSTELLIX_API_KEY }}
  CONSTELLIX_SECRET_KEY:  ${{ secrets.CONSTELLIX_SECRET_KEY }}
  QUANTCDN_API_TOKEN: ${{ secrets.QUANT_BEARER }}

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

#      - name: Terraform fmt
#        id: fmt
#        run: terraform fmt -check

      - name: Initialize Terraform
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode
          exitcode="$?"
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          if [[ $exitcode -eq 2 ]]
          then
            exit 0
          else
            exit $exitcode
          fi

      - name: Check Terraform Plan
        run: |
          echo "Terraform plan returned ${{ steps.plan.outputs.exitcode }}"
          echo "2 = Succeeded with non-empty diff (changes present) "

      - name: Render plan diff
        id: show
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Determine plan comment strategy
        id: plan_comment
        run: |
          plan_chars="$(wc -m < tfplan.txt)"
          max_comment_chars=50000
          is_long=false
          if [ "$plan_chars" -gt "$max_comment_chars" ]; then
            is_long=true
          fi
          echo "plan_chars=$plan_chars" >> "$GITHUB_OUTPUT"
          echo "max_comment_chars=$max_comment_chars" >> "$GITHUB_OUTPUT"
          echo "is_long=$is_long" >> "$GITHUB_OUTPUT"

      - name: Upload long terraform plan
        if: github.event_name == 'pull_request' && steps.plan_comment.outputs.is_long == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: tfplan.txt
          retention-days: 7


      - uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs')
            const planOutput = fs.readFileSync('tfplan.txt', 'utf8')
            const planChars = Number('${{ steps.plan_comment.outputs.plan_chars }}')
            const maxCommentChars = Number('${{ steps.plan_comment.outputs.max_comment_chars }}')
            const isLongPlan = '${{ steps.plan_comment.outputs.is_long }}' === 'true'
            const planArtifactName = 'terraform-plan-${{ github.run_id }}'
            const workflowRunUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            const planSection = isLongPlan
              ? `Terraform plan is too large to include in this comment (${planChars} chars, limit ${maxCommentChars}). Download the \`${planArtifactName}\` artifact from [this workflow run](${workflowRunUrl}).`
              : `\`\`\`\n${planOutput}\n\`\`\``

            // 1. Retrieve existing bot comments for the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Format and Style')
            })

            // 2. Prepare format of the comment
            const output = `#### Terraform Format and Style 🖌\`TEMPORARILY REMOVED\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`\n
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            ${planSection}

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            // 3. If we have a comment, update it, otherwise create a new one
            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              })
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              })
            }
