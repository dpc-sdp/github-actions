name: Create Pull Request

on:
  workflow_call:
    inputs:
      branch_name:
        description: "Branch name to create PR from"
        required: true
        type: string
      PR_message:
        description: "PR Message"
        required: false
        default: "Automated PR generated using GHA"
        type: string
    
jobs:
  create_pull_request:
    name: Create Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Pull Request
        run: |
          existing_pr_url="$(gh pr list \
            --state open \
            --base develop \
            --head "$BRANCH_NAME" \
            --repo "$GH_REPO" \
            --json url \
            --jq '.[0].url')"

          if [[ -n "$existing_pr_url" ]]; then
            echo "A pull request already exists: $existing_pr_url"
            exit 0
          fi

          gh pr create \
            --title "Automated PR for release - $BRANCH_NAME" \
            --body "$PR_MESSAGE" \
            --base develop \
            --head "$BRANCH_NAME" \
            --repo "$GH_REPO"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          PR_MESSAGE: ${{ inputs.PR_message }}
